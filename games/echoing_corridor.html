<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Echoing Corridor</title>
    <link rel="stylesheet" href="../styles.css">
</head>
<body>
    <div class="ui-container">
        <div class="instructions">
            Use WASD/Arrows to move. Click to send a SONAR PING.<br>
            High noise levels attract the Shadowy Entity. Reach the white goal.
        </div>
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div class="stats-container">
            <div class="stats-item">NOISE LEVEL</div>
            <div id="score" class="stats-item">SCORE: 0</div>
            <div id="high-score" class="stats-item">BEST: 0</div>
            <div id="timer" class="stats-item">TIME: 00:00</div>
        </div>
        <div class="noise-bar-container">
            <div id="noise-bar"></div>
        </div>
        <div id="status">STATUS: EXPLORING</div>
    </div>
    <script src="echoing_corridor.js"></script>
</body>
</html>
