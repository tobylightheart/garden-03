<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Echoing Corridor</title>
    <style>
        body {
            margin: 0;
            background: radial-gradient(circle, #1a1a1a 0%, #050505 100%);
            color: #e0e0e0;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        canvas {
            border: 2px solid #333;
            background-color: #000;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.05);
            cursor: crosshair;
        }
        #ui {
            margin-top: 20px;
            text-align: center;
        }
        .noise-bar-container {
            width: 300px;
            height: 20px;
            background: #222;
            border: 1px solid #444;
            margin: 10px 0;
        }
        #noise-bar {
            height: 100%;
            width: 0%;
            background: #ff4444;
            transition: width 0.1s;
        }
        .instructions {
            font-size: 0.9rem;
            color: #888;
            max-width: 600px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="instructions">
        Use WASD/Arrows to move. Click to send a SONAR PING.<br>
        High noise levels attract the Shadowy Entity. Reach the white goal.
    </div>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <div id="ui">
        <div style="display: flex; gap: 20px; justify-content: center;">
            <div>NOISE LEVEL</div>
            <div id="score">SCORE: 0</div>
            <div id="high-score">BEST: 0</div>
        </div>
        <div class="noise-bar-container">
            <div id="noise-bar"></div>
        </div>
        <div id="status">STATUS: EXPLORING</div>
    </div>
    <script src="echoing_corridor.js"></script>
</body>
</html>
