<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Echoing Corridor</title>
    <link rel="stylesheet" href="../styles.css">
</head>
<body>
    <main class="ui-container">
        <h1 class="ui-header">The Echoing Corridor</h1>
        <div class="instructions">Use <b class="key">WASD</b>/<b class="key">Arrows</b> to move. Click the canvas to send a sonar ping.<br>High noise attracts the Shadow. Reach the white goal.</div>
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div class="stats-container">
            <div class="stats-item">NOISE LEVEL</div>
            <div id="score" class="stats-item">SCORE: 0</div>
            <div id="high-score" class="stats-item">BEST: 0</div>
            <div id="timer" class="stats-item">TIME: 02:00</div>
        </div>
        <div class="noise-bar-container"><div id="noise-bar"></div></div>
        <div id="status">STATUS: EXPLORING</div>
        <nav class="game-nav"><a href="../index.html" class="btn-link">Back to Maze</a><a href="shadow_path.html" class="btn-link">Next Chamber</a></nav>
    </main>
    <script src="echoing_corridor.js"></script>
</body>
</html>
