<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Fractal Fold</title>
    </head>
    <body

        <h1 class="ui-header">The Fractal Fold</h1>
        <div class="instructions">
            <p>Navigate the non-Euclidean labyrinth. <br>Use <b>WASD</b> to move. <br>Press <b>'F'</b> to <b>Fold</b> the current room's connections.</p>
        </div>
        <div id="game-container">
            <canvas id="gameCanvas" width="600" height="600"></canvas>
        </div>
        <div id="status">Find the exit.</div>
        <div class="controls">WASD: Move | F: Fold | R: Reset</div>
    </div>
    <script src="fractal_fold.js"></script>
</body>
