<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Prism Maze</title>
    <style>
        body {
            background: radial-gradient(circle at center, #1a1a1a 0%, #0a0a0a 100%);
            color: #e0e0e0;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }
        canvas {
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            background: #000;
            max-width: 90vw;
            max-height: 70vh;
        }
        .ui {
            margin-top: 20px;
            text-align: center;
            max-width: 600px;
        }
        .controls {
            margin-top: 10px;
            font-size: 0.9em;
            color: #888;
        }
        .status {
            font-weight: bold;
            color: #00d4ff;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <h1>The Prism Maze</h1>
    <div class="status" id="status">Route the beam to the Sanctum</div>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <div class="ui">
        <p>The walls are invisible until the light touches them. Rotate the mirrors to guide the beam through at least 5 reflections to the central sanctum.</p>
        <div class="controls">
            Click on a mirror to select it. Use <b>Left/Right Arrow Keys</b> to rotate.
        </div>
    </div>
    <script src="prism_maze.js"></script>
</body>
</html>
