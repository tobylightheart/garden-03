<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Maze of Games</title>
    <style>
        body {
            background: radial-gradient(circle at center, #1a1a1a 0%, #0a0a0a 100%);
            color: #e0e0e0;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }
        h1 { 
            font-size: 4rem; 
            margin-bottom: 3rem; 
            letter-spacing: 5px; 
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.8);
        }
        .maze-container {
            max-width: 800px;
            width: 90%;
            padding: 40px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
        }
        .maze-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
        }
        .game-card {
            padding: 30px;
            border: 1px solid #333;
            background: linear-gradient(145deg, #1e1e1e, #151515);
            border-radius: 12px;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-decoration: none;
            color: inherit;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            display: block;
        }
        .game-card:hover {
            transform: translateY(-5px) scale(1.05);
            border-color: #fff;
            box-shadow: 0 10px 30px rgba(255, 255, 255, 0.1);
        }
        .game-card h3 {
            margin: 0 0 10px 0;
            font-size: 1.5rem;
        }
        .game-card p {
            font-size: 0.9rem;
            color: #888;
            margin: 0;
        }
        footer {
            margin-top: 4rem;
            font-size: 0.8rem;
            color: #555;
        }
    </style>
</head>
<body>
    <h1>THE MAZE</h1>
    <div class="maze-container">
        <div class="maze-grid">
            <!-- Game entries -->
            <a href="games/echoing_corridor.html" class="game-card">
                <h3>The Echoing Corridor</h3>
                <p>Use sonar to navigate the void. Beware the shadows.</p>
            </a>
        </div>
    </div>
    <footer>
        &copy; 2026 The Maze of Games
    </footer>
</body>
</html>
